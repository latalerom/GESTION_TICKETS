<!DOCTYPE html>
<html>
<head>
    <title>Editar Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Editar Ticket</h2>

<form method="POST">
    <input type="text" name="titulo" value="{{ ticket.titulo }}" class="form-control mb-2" required>
    
    <textarea name="descripcion" class="form-control mb-2" required>{{ ticket.descripcion }}</textarea>
    
    <button class="btn btn-primary" 
onclick="return confirm('¿Guardar cambios en este ticket?')">
Guardar cambios
</button>
</form>

</body>
</html>
